# Configuration for node-red setup

# Application Name
name: node-red

# Services used in the application
services:
  # The `app` service for the node-red application
  app:
    # Name of the container
    container_name: node-red
    # Docker image to be used
    image: nodered/node-red:5.0.1@sha256:6cb1b27fa5a83deec6a662db62eec8bb32e55ac5412d6b7a653e874ce62055d5
    # Restart policy for the service
    restart: unless-stopped
    # Port mappings for the service
    ports:
      - "1880:1880"
    # Network mode for the service
    network_mode: bridge
    # Volumes for the service HOST -> CONTAINER
    volumes:
      - node-red_data:/data

volumes:
  node-red_data:
    name: node-red_data
    driver: local
